<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand">LEDGER<span>.</span></div>
      <div class="brand-sub">// personal expense tracker — stored on this device</div>
    </div>
    <div class="today" id="todayDate"></div>
  </header>

  <section class="stats">
    <div class="stat-card balance">
      <div class="stat-label">Balance</div>
      <div class="stat-value" id="statBalance">₹0</div>
    </div>
    <div class="stat-card income">
      <div class="stat-label">Total Income</div>
      <div class="stat-value" id="statIncome">₹0</div>
    </div>
    <div class="stat-card expense">
      <div class="stat-label">Total Expenses</div>
      <div class="stat-value" id="statExpense">₹0</div>
    </div>
  </section>

  <div class="grid">

    <!-- LEFT: Form + List -->
    <div class="panel">
      <h2>Add an entry</h2>
      <form class="entry-form" id="txForm">
        <div class="field type-toggle full" id="typeToggle">
          <button type="button" data-type="expense" class="active">Expense</button>
          <button type="button" data-type="income">Income</button>
        </div>

        <div class="field full">
          <label for="desc">Description</label>
          <input type="text" id="desc" placeholder="e.g. Groceries, Freelance payment" required>
        </div>

        <div class="field">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required>
        </div>

        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>

        <div class="field full">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚌 Transport</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Bills">🧾 Bills</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Health">💊 Health</option>
            <option value="Salary">💰 Salary</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>

        <button type="submit" class="add-btn">Add Entry</button>
      </form>

      <h2>Transactions</h2>
      <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="income">Income</button>
        <button data-filter="expense">Expense</button>
        <select id="categoryFilter">
          <option value="all">All categories</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Bills">Bills</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Salary">Salary</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="tx-list" id="txList"></div>
    </div>

    <!-- RIGHT: Breakdown -->
    <div class="panel">
      <h2>Spending breakdown</h2>
      <div class="donut-wrap">
        <div class="donut" id="donut">
          <div class="donut-center">
            <div class="lbl">Spent</div>
            <div class="val" id="donutTotal">₹0</div>
          </div>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
